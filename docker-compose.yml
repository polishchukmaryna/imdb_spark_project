version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pyspark_app
    env_file:
      - .env
    volumes:
      - .:/app
      - E:\my_projects\datasets:/datasets
    environment:
      - DATASET_PATH=/datasets
    working_dir: /app
    command: python main.py
